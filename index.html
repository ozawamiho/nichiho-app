async function syncToFirestore(key, data) {
  try {
    if (!fsReady) return; // Silent fail if Firebase not ready
    
    if (key === 'nissho_users') {
      await db.collection('app').doc('config').set({ users: data }, { merge: true });
    } else if (key === 'nissho_admin_pw') {
      await db.collection('app').doc('config').set({ adminPw: data }, { merge: true });
    } else if (key.startsWith('nissho_reports_')) {
      const userName = key.replace('nissho_reports_', '');
      await db.collection('users').doc(userName).set({ reports: data }, { merge: true });
    } else if (key.startsWith('nissho_settings_')) {
      const userName = key.replace('nissho_settings_', '');
      await db.collection('users').doc(userName).set({ settings: data }, { merge: true });
    } else if (key.startsWith('nissho_weekly_')) {
      const userName = key.replace('nissho_weekly_', '');
      await db.collection('users').doc(userName).set({ weekly: data }, { merge: true });
    } else if (key.startsWith('nissho_daysoff_')) {
      const userName = key.replace('nissho_daysoff_', '');
      await db.collection('users').doc(userName).set({ daysoff: data }, { merge: true });
    } else if (key.startsWith('nissho_annual_')) {
      const userName = key.replace('nissho_annual_', '');
      await db.collection('users').doc(userName).set({ annual: data }, { merge: true });
    } else if (key.startsWith('nissho_draft_')) {
      const userName = key.replace('nissho_draft_', '');
      await db.collection('users').doc(userName).set({ draft: data }, { merge: true });
    } else if (key.startsWith('nissho_admincomments_')) {
      const userName = key.replace('nissho_admincomments_', '');
      await db.collection('users').doc(userName).set({ adminComments: data }, { merge: true });
    }
  } catch (err) {
    console.warn('Firestore sync failed:', err.message);
  }
}

async function syncFromFirestore(userName) {
  try {
    if (!fsReady) return;
    if (!userName) return;
    
    const userDoc = await db.collection('users').doc(userName).get();
    if (!userDoc.exists) {
      // User not in Firestore yet - push their local data up
      const userData = {};
      const reports = localStorage.getItem('nissho_reports_' + userName);
      if (reports) userData.reports = JSON.parse(reports);
      const settings = localStorage.getItem('nissho_settings_' + userName);
      if (settings) userData.settings = JSON.parse(settings);
      const weekly = localStorage.getItem('nissho_weekly_' + userName);
      if (weekly) userData.weekly = JSON.parse(weekly);
      const daysoff = localStorage.getItem('nissho_daysoff_' + userName);
      if (daysoff) userData.daysoff = JSON.parse(daysoff);
      const annual = localStorage.getItem('nissho_annual_' + userName);
      if (annual) userData.annual = JSON.parse(annual);
      const draft = localStorage.getItem('nissho_draft_' + userName);
      if (draft) userData.draft = JSON.parse(draft);
      if (Object.keys(userData).length > 0) {
        await db.collection('users').doc(userName).set(userData, { merge: true });
        console.log('Pushed local data for ' + userName + ' to Firestore');
      }
      return;
    }
    
    const data = userDoc.data();
    
    // Sync each field from Firestore to localStorage
    if (data.reports !== undefined) {
      localStorage.setItem('nissho_reports_' + userName, JSON.stringify(data.reports));
    }
    if (data.settings !== undefined) {
      localStorage.setItem('nissho_settings_' + userName, JSON.stringify(data.settings));
    }
    if (data.weekly !== undefined) {
      localStorage.setItem('nissho_weekly_' + userName, JSON.stringify(data.weekly));
    }
    if (data.daysoff !== undefined) {
      localStorage.setItem('nissho_daysoff_' + userName, JSON.stringify(data.daysoff));
    }
    if (data.annual !== undefined) {
      localStorage.setItem('nissho_annual_' + userName, JSON.stringify(data.annual));
    }
    if (data.draft !== undefined) {
      localStorage.setItem('nissho_draft_' + userName, JSON.stringify(data.draft));
    }
    if (data.adminComments !== undefined) {
      localStorage.setItem('nissho_admincomments_' + userName, JSON.stringify(data.adminComments));
    }
  } catch (err) {
    console.warn('Firestore sync failed:', err.message);
  }
}

async function initialPushToFirestore() {
  try {
    if (!fsReady) return;
    console.log('Initial migration: pushing localStorage to Firestore...');
    
    // Push users list
    const users = JSON.parse(localStorage.getItem('nissho_users') || '[]');
    if (users.length > 0) {
      await db.collection('app').doc('config').set({ users: users }, { merge: true });
    }
    
    // Push admin password
    const adminPw = localStorage.getItem('nissho_admin_pw');
    if (adminPw) {
      await db.collection('app').doc('config').set({ adminPw: adminPw }, { merge: true });
    }
    
    // Push each user's data
    for (const userName of users) {
      const userData = {};
      const reports = localStorage.getItem('nissho_reports_' + userName);
      if (reports) userData.reports = JSON.parse(reports);
      const settings = localStorage.getItem('nissho_settings_' + userName);
      if (settings) userData.settings = JSON.parse(settings);
      const weekly = localStorage.getItem('nissho_weekly_' + userName);
      if (weekly) userData.weekly = JSON.parse(weekly);
      const daysoff = localStorage.getItem('nissho_daysoff_' + userName);
      if (daysoff) userData.daysoff = JSON.parse(daysoff);
      const annual = localStorage.getItem('nissho_annual_' + userName);
      if (annual) userData.annual = JSON.parse(annual);
      const draft = localStorage.getItem('nissho_draft_' + userName);
      if (draft) userData.draft = JSON.parse(draft);
      
      if (Object.keys(userData).length > 0) {
        await db.collection('users').doc(userName).set(userData, { merge: true });
      }
    }
    console.log('Initial migration complete!');
  } catch (err) {
    console.log('Initial migration failed:', err.message);
  }
}

async function syncAppDataFromFirestore() {
  try {
    if (!fsReady) return;
    
    const configDoc = await db.collection('app').doc('config').get();
    if (!configDoc.exists) {
      // Firestore is empty - push local data up (first-time migration)
      await initialPushToFirestore();
      return;
    }
    
    const data = configDoc.data();
    if (data.users !== undefined) {
      const localUsers = JSON.parse(localStorage.getItem('nissho_users') || '[]');
      // Merge: combine Firestore users with local users (no duplicates)
      const merged = [...new Set([...data.users, ...localUsers])];
      localStorage.setItem('nissho_users', JSON.stringify(merged));
      if (merged.length > data.users.length) {
        await db.collection('app').doc('config').set({ users: merged }, { merge: true });
      }
    }
    if (data.adminPw !== undefined) {
      localStorage.setItem('nissho_admin_pw', data.adminPw);
    }
  } catch (err) {
    console.warn('Firestore app data sync failed:', err.message);
  }
}

// Check Firestore connectivity on startup
// Transition to login view after Firestore sync (or timeout)
function _finishLoading(){
  if(S.view==='loading'){
    S.view='login';
    if(typeof render==='function') render();
  }
}
// Safety timeout: never wait more than 8 seconds
setTimeout(_finishLoading, 8000);
db.collection('app').doc('config').get().then(async () => {
  fsReady = true;
  console.log('Firebase Firestore initialized and ready');
  try { await syncAppDataFromFirestore(); } catch(e){}
  _finishLoading();
}).catch(err => {
  fsReady = false;
  console.warn('Firebase Firestore not available:', err.message);
